<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ESP32 NAS</title>
    <style>
        body { background-color: #202020; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        .btn { padding: 8px 12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; }
        .btn-back { background-color: #4daafc; color: #000; }
        .btn-danger { background-color: #ff4d4d; color: #000; }
        .btn-promote { background-color: #fce84d; color: #000; }
        
        /* Tabs */
        .tabs { display: flex; border-bottom: 2px solid #444; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; color: #aaa; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { color: #fff; border-bottom: 2px solid #4daafc; font-weight: bold; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Table */
        table { width: 100%; border-collapse: collapse; background-color: #2d2d2d; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #444; }
        th { background-color: #1a1a1a; color: #aaa; text-transform: uppercase; font-size: 12px; }
        tr:hover { background-color: #333; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-admin { background-color: #fce84d; color: #000; }
        .badge-user { background-color: #4daafc; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h2 style="margin: 0;">System Administration</h2>
        <button class="btn btn-back" onclick="window.location.href='/'">Back to NAS</button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('users-tab', this)">User Management</div>
        <div class="tab" onclick="switchTab('activity-tab', this)">Activity Log</div>
    </div>

    <!-- USER MANAGEMENT TAB -->
    <div id="users-tab" class="tab-content active">
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Account Created</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
                <tr><td colspan="4" style="text-align: center; color: #aaa;">Loading users...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- ACTIVITY LOG TAB (Placeholder for future architecture) -->
    <div id="activity-tab" class="tab-content">
        <div style="background-color: #2d2d2d; padding: 40px; text-align: center; border-radius: 8px; border: 2px dashed #444;">
            <h3 style="color: #aaa;">Activity Logging</h3>
            <p style="color: #666;">This feature is currently under construction. Future updates will track file uploads, downloads, and deletions here.</p>
        </div>
    </div>
</div>

<script>
    let currentUser = ""; // Tracks the currently logged-in admin

    // Tab switching logic
    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    // Ensure only admins can access this page
    async function verifyAdminAccess() {
        try {
            const response = await fetch('/api/me');
            if (!response.ok) throw new Error("Not logged in");
            const data = await response.json();
            if (data.role !== 1) {
                alert("Access Denied: Administrators only.");
                window.location.href = "/";
                return;
            }
            currentUser = data.username;
            loadUsers();
        } catch (err) {
            window.location.href = "/login.html";
        }
    }

    // Fetch and populate the user table
    async function loadUsers() {
        try {
            const response = await fetch('/api/admin/users');
            if (!response.ok) throw new Error("Failed to fetch users");
            const users = await response.json();
            
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = "";

            users.forEach(user => {
                const isSelf = user.username === currentUser;
                const isAdmin = user.role === 1;
                
                // Format the creation date (Will show "Unknown" until ESP32 is synced with NTP time)
                let dateText = "Unknown";
                if (user.createdAt > 0) {
                    dateText = new Date(user.createdAt * 1000).toLocaleDateString();
                }

                // Enforce Admin Rules: Cannot delete oneself, and cannot modify other admins.
                let actionHtml = "";
                if (isSelf) {
                    actionHtml = `<span style="color: #aaa; font-style: italic;">(You)</span>`;
                } else if (isAdmin) {
                    actionHtml = `<span style="color: #aaa; font-style: italic;">Protected</span>`;
                } else {
                    actionHtml = `
                        <button class="btn btn-promote" onclick="promoteUser('${user.username}')">Promote to Admin</button>
                        <button class="btn btn-danger" onclick="deleteUser('${user.username}')" style="margin-left: 10px;">Delete</button>
                    `;
                }

                const roleBadge = isAdmin 
                    ? `<span class="badge badge-admin">Admin</span>` 
                    : `<span class="badge badge-user">User</span>`;

                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight: bold;">${user.username}</td>
                        <td>${roleBadge}</td>
                        <td>${dateText}</td>
                        <td style="text-align: right;">${actionHtml}</td>
                    </tr>
                `;
            });
        } catch (err) {
            console.error(err);
            alert("Failed to load user list.");
        }
    }

    async function promoteUser(username) {
        if (!confirm(`Are you sure you want to promote ${username} to an Administrator?`)) return;
        
        const formData = new URLSearchParams();
        formData.append("username", username);
        formData.append("role", 1); // 1 = Admin

        await fetch('/api/admin/roles', { method: 'POST', body: formData });
        loadUsers(); // Refresh the table
    }

    async function deleteUser(username) {
        if (!confirm(`WARNING: Are you absolutely sure you want to delete the account '${username}'? This cannot be undone.`)) return;

        await fetch(`/api/admin/users?username=${encodeURIComponent(username)}`, { method: 'DELETE' });
        loadUsers(); // Refresh the table
    }

    // Boot sequence
    verifyAdminAccess();
</script>
</body>
</html>
