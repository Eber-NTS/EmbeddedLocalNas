<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 NAS SPA</title>
    <style>
        body { background-color: #202020; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .file-box { background-color: #2d2d2d; border-radius: 8px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px;}
        .file-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; }
        .action-link { text-decoration: none; margin-right: 15px; cursor: pointer; }
        .back-btn { font-size: 20px; color: #fff; text-decoration: none; cursor: pointer; }
        .drop-zone {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            border: 2px dashed #444;
            transition: all 0.3s ease;
        }
        .drop-zone.dragover {
            background-color: #3d3d3d;
            border-color: #4daafc;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2 id="current-dir-header" style="margin: 0;">Loading...</h2>
        <div style="display: flex; gap: 5px;">
            <select id="sort-select" onchange="onSortChange()" style="padding: 8px; border-radius: 4px; border: 1px solid #444; background: #1a1a1a; color: white;">
                <option value="name_asc">Name (A-Z)</option>
                <option value="name_desc">Name (Z-A)</option>
                <option value="date_desc">Newest First</option>
                <option value="date_asc">Oldest First</option>
            </select>
            <input type="text" id="search-input" placeholder="Search files..." style="padding: 8px; border-radius: 4px; border: 1px solid #444; background: #1a1a1a; color: white;">
            <button onclick="performSearch()" style="background-color: #4daafc; padding: 8px 12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Search</button>
            <button id="admin-panel-btn" onclick="window.location.href='/admin.html'" style="display: none; background-color: #fce84d; color: black; padding: 8px 12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-left: 10px;">Admin Panel</button>
            <button onclick="logout()" style="background-color: #ff4d4d; padding: 8px 12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-left: 10px;">Logout</button>
        </div>
    </div>

    <div class="file-box" id="file-list">

    </div>


    <div class="drop-zone" id="drop-zone">
        <h3>Upload File</h3>
        <p style="color: #aaa; margin-bottom: 15px;">Drag & Drop files here, or choose a file below</p>
        <form id="upload-form">
            <input type="file" id="upload-input" required style="color:white;">
            <button type="submit" id="upload-btn" style="background-color: #4daafc; padding: 8px 16px; border:none; border-radius:4px; font-weight:bold; cursor: pointer;">Upload</button>
        </form>
    </div>
</div>

<script>
    // Global variables:
    let currentDirectory = "/"; //Remembers the current folder being viewed
    let lastDataJson = ""; //stores a text copy of the last data the esp32 sent. Used to check if anything has actually changed before redrawing the screen. Prevents the screen from flickering every 3 seconds.
    let isSearching = false; //Keeps track if the user is currently looking at search results rather than a standard folder
    let currentSearchQuery = ""; //keeps track of what query was requested
    let currentSort = "name_asc"; // Default sort order

    async function checkUserRole() {
        try {
            const response = await fetch('/api/me');
            if (response.ok) {
                const data = await response.json();
                if (data.role === 1) {
                    document.getElementById('admin-panel-btn').style.display = 'inline-block';
                }
            } else if (response.status === 401) {
                window.location.href = "/login.html";
            }
        } catch (err) {
            console.error("Failed to fetch user info", err);
        }
    }

    // Call checkUserRole on page load
    checkUserRole();

    function onSortChange() {
        currentSort = document.getElementById('sort-select').value;
        lastDataJson = ""; // Force re-render on sort change
        if (isSearching) {
            performSearch(currentSearchQuery);
        } else {
            loadDirectory(currentDirectory, false);
        }
    }



    //Asks the esp32 for the contents of a specific folder.
    async function loadDirectory(path, pushHistory = true) {

        isSearching = false;  //Search mode is used for refreshing to a search directory. Folder mode is used for refreshing currant folder.
        if (currentDirectory !== path) { //checks if the user wants to look at a different path than from the current one.
            lastDataJson = "";// if the user is going to a new folder
        }
        currentDirectory = path; //updates the current path being tracked. Remembers the folder that was just clicked.

        //Updates the browser's URL using window.History.pushState
        if (pushHistory) {
            window.history.pushState({ path: path }, "", "?dir=" + path);//built-in browser feature that tells the browser to change the URL address bar and save it to the user's history. Does not actually reload the page.
        }
        //searches the html document for the target id="current-dir-header". located in <h2>
        //changes the visible text inside the header to match the new folder just opened.
        document.getElementById('current-dir-header').innerText = "Index of: " + path;

        //
        try {
            const response = await fetch(`/api/list?dir=${path}&sort=${currentSort}`);
            if (response.status === 401) {
                window.location.href = "/login.html";
                return;
            }

            const data = await response.json();
            
            // Only re-render if the data has changed to prevent flickering from setInterval
            const currentDataJson = JSON.stringify(data);
            if (currentDataJson !== lastDataJson) {
                lastDataJson = currentDataJson;
                renderFiles(data.files, data.dir);
            }
        } catch (err) {
            console.error("Failed to load directory", err);
        }
    }


    function renderFiles(files, dirPath) {
        const fileListDiv = document.getElementById('file-list');
        let html = "";


        if (dirPath !== "/") {
            let parentPath = dirPath.substring(0, dirPath.lastIndexOf('/'));
            if (parentPath === "") parentPath = "/";
            
            html += `
                <div class="file-row">
                    <span class="back-btn" onclick="loadDirectory('${parentPath}')">⬅️ .. (Up one level)</span>
                </div>
            `;
        }

        if (files.length === 0) {
            fileListDiv.innerHTML = html + "<p style='color: #888; text-align: center; padding: 10px;'>Folder is empty.</p>";
            return;
        }


        files.forEach(file => {
            const icon = file.isFolder ? "📁" : "📄";
            const sizeText = file.isFolder ? "--" : Math.floor(file.size / 1024) + " KB";
            const dateText = file.lastMod ? new Date(file.lastMod * 1000).toLocaleDateString() : "--";
            
            let itemPath = dirPath.endsWith("/") ? dirPath + file.name : dirPath + "/" + file.name;

            let primaryAction = file.isFolder 
                ? `<span class="action-link" style="color: #fce84d;" onclick="loadDirectory('${itemPath}')">Open</span>`
                : `<a class="action-link" style="color: #4daafc;" href="/download?file=${itemPath}">Download</a>`;
                
            let deleteAction = `<span class="action-link" style="color: #ff4d4d;" onclick="deleteFile('${itemPath}', '${file.name}')">Delete</span>`;

            html += `
                <div class="file-row">
                    <div style="flex: 2; display: flex; align-items: center;">
                        <span style="font-size: 24px; margin-right: 15px;">${icon}</span>${file.name}
                    </div>
                    <div style="flex: 1; color: #aaa;">${dateText}</div>
                    <div style="flex: 1; color: #aaa;">${sizeText}</div>
                    <div style="flex: 1; text-align: right;">${primaryAction}${deleteAction}</div>
                </div>
            `;
        });
        fileListDiv.innerHTML = html;
    }

    
    async function deleteFile(path, name) {
        if (!confirm(`Are you sure you want to delete ${name}?`)) return;
        
        await fetch(`/delete?file=${path}`, { method: 'GET' });
        lastDataJson = ""; // Force re-render
        loadDirectory(currentDirectory, false); // Instantly refresh folder list
    }
    
    // Specialized delete function for the search view
    async function deleteSearchItem(path, name) {
        if (!confirm(`Are you sure you want to delete ${name}?`)) return;
        
        await fetch(`/delete?file=${path}`, { method: 'GET' });
        lastDataJson = ""; // Force re-render
        performSearch(currentSearchQuery); // Instantly refresh search results
    }

    async function performSearch(query) {
        const q = query || document.getElementById('search-input').value;
        if (!q) {
            loadDirectory(currentDirectory);
            return;
        }

        isSearching = true;
        currentSearchQuery = q;
        document.getElementById('current-dir-header').innerText = "Search results for: " + q;

        try {
            const response = await fetch(`/api/search?q=${encodeURIComponent(q)}&sort=${currentSort}`);
            if (response.status === 401) {
                window.location.href = "/login.html";
                return;
            }

            const data = await response.json();

            const currentDataJson = JSON.stringify(data);
            if (currentDataJson !== lastDataJson) {
                lastDataJson = currentDataJson;
                renderSearchResults(data.files);
            }
        } catch (err) {
            console.error("Search failed", err);
        }
    }

    function renderSearchResults(files) {
        const fileListDiv = document.getElementById('file-list');
        let html = `
            <div class="file-row">
                <span class="back-btn" onclick="loadDirectory(currentDirectory)">⬅️ Back to folder</span>
            </div>
        `;

        if (files.length === 0) {
            fileListDiv.innerHTML = html + "<p style='color: #888; text-align: center; padding: 10px;'>No files found.</p>";
            return;
        }

        files.forEach(file => {
            const icon = file.isFolder ? "📁" : "📄";
            const sizeText = file.isFolder ? "--" : Math.floor(file.size / 1024) + " KB";
            const dateText = file.lastMod ? new Date(file.lastMod * 1000).toLocaleDateString() : "--";
            let itemPath = file.parentDir.endsWith("/") ? file.parentDir + file.name : file.parentDir + "/" + file.name;

            let primaryAction = file.isFolder 
                ? `<span class="action-link" style="color: #fce84d;" onclick="loadDirectory('${itemPath}')">Open</span>`
                : `<a class="action-link" style="color: #4daafc;" href="/download?file=${itemPath}">Download</a>`;
                
            let deleteAction = `<span class="action-link" style="color: #ff4d4d;" onclick="deleteSearchItem('${itemPath}', '${file.name}')">Delete</span>`;

            html += `
                <div class="file-row">
                    <div style="flex: 2; display: flex; align-items: center;">
                        <div style="display: flex; flex-direction: column;">
                            <div style="display: flex; align-items: center;">
                                <span style="font-size: 24px; margin-right: 15px;">${icon}</span>${file.name}
                            </div>
                            <small style="color: #666; margin-left: 39px;">${file.parentDir}</small>
                        </div>
                    </div>
                    <div style="flex: 1; color: #aaa;">${dateText}</div>
                    <div style="flex: 1; color: #aaa;">${sizeText}</div>
                    <div style="flex: 1; text-align: right;">${primaryAction}${deleteAction}</div>
                </div>
            `;
        });
        fileListDiv.innerHTML = html;
    }

    // Clears the cookie and reloads the page (which kicks them to login)
    function logout() {
        document.cookie = "ESP32_SESSION=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        window.location.href = "/login.html";
    }

    // Allow hitting "Enter" on the keyboard to trigger the search
    document.getElementById('search-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') performSearch();
    });

    window.addEventListener("popstate", (event) => {
        if (event.state && event.state.path) {
            loadDirectory(event.state.path, false);
        } else {
            loadDirectory("/", false);
        }
    });


    async function uploadFile(file) {
        const formData = new FormData();
        formData.append('upload_file', file);

        const submitBtn = document.getElementById('upload-btn');
        submitBtn.disabled = true;
        submitBtn.innerText = "Uploading...";

        try {
            const response = await fetch(`/upload?dir=${currentDirectory}`, {
                method: 'POST',
                body: formData
            });
            
            if (response.status === 401) {
                window.location.href = "/login.html";
                return;
            }
            document.getElementById('upload-input').value = "";
            lastDataJson = ""; // Force re-render
            await loadDirectory(currentDirectory, false);
        } catch (err) {
            alert("Upload failed");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Upload";
        }
    }

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById('upload-input');
        if(fileInput.files.length === 0) return;
        await uploadFile(fileInput.files[0]);
    });

    // Drag and drop event listeners
    const dropZone = document.getElementById('drop-zone');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    dropZone.addEventListener('drop', async (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;

        if (files.length === 0) return;

        // Update input element for visual feedback
        const fileInput = document.getElementById('upload-input');
        fileInput.files = files;

        await uploadFile(files[0]);
    });


    const urlParams = new URLSearchParams(window.location.search);
    const startDir = urlParams.get('dir') || "/";
    loadDirectory(startDir);


    setInterval(() => {
        if (isSearching) {
            performSearch(currentSearchQuery);
        } else {
            loadDirectory(currentDirectory, false);
        }
    }, 3000);

</script>
</body>
</html>
