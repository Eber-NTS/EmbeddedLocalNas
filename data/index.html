<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 NAS SPA</title>
    <style>
        body { background-color: #202020; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .file-box { background-color: #2d2d2d; border-radius: 8px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px;}
        .file-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; }
        .action-link { text-decoration: none; margin-right: 15px; cursor: pointer; }
        .back-btn { font-size: 20px; color: #fff; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div style="border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2 id="current-dir-header" style="margin: 0;">Loading...</h2>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="search-input" placeholder="Search files..." style="padding: 8px; border-radius: 4px; border: 1px solid #444; background: #1a1a1a; color: white;">
            <button onclick="performSearch()" style="background-color: #4daafc; padding: 8px 12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Search</button>
            <button onclick="logout()" style="background-color: #ff4d4d; padding: 8px 12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-left: 10px;">Logout</button>
        </div>
    </div>

    <div class="file-box" id="file-list">

    </div>

    <!-- Simple upload form -->
    <div style="background-color: #2d2d2d; border-radius: 8px; padding: 15px; text-align: center;">
        <h3>Upload File</h3>
        <form id="upload-form">
            <input type="file" id="upload-input" required style="color:white;">
            <button type="submit" style="background-color: #4daafc; padding: 8px 16px; border:none; border-radius:4px; font-weight:bold;">Upload</button>
        </form>
    </div>
</div>

<script>
    let currentDirectory = "/";
    let lastDataJson = "";
    let isSearching = false;
    let currentSearchQuery = "";


    async function loadDirectory(path, pushHistory = true) {
        isSearching = false;
        if (currentDirectory !== path) {
            lastDataJson = "";
        }
        currentDirectory = path;

        if (pushHistory) {
            window.history.pushState({ path: path }, "", "?dir=" + path);
        }

        document.getElementById('current-dir-header').innerText = "Index of: " + path;

        try {
            const response = await fetch(`/api/list?dir=${path}`);
            if (response.status === 401) {
                window.location.href = "/login.html";
                return;
            }

            const data = await response.json();
            
            // Only re-render if the data has changed to prevent flickering from setInterval
            const currentDataJson = JSON.stringify(data);
            if (currentDataJson !== lastDataJson) {
                lastDataJson = currentDataJson;
                renderFiles(data.files, data.dir);
            }
        } catch (err) {
            console.error("Failed to load directory", err);
        }
    }


    function renderFiles(files, dirPath) {
        const fileListDiv = document.getElementById('file-list');
        let html = "";


        if (dirPath !== "/") {
            let parentPath = dirPath.substring(0, dirPath.lastIndexOf('/'));
            if (parentPath === "") parentPath = "/";
            
            html += `
                <div class="file-row">
                    <span class="back-btn" onclick="loadDirectory('${parentPath}')">⬅️ .. (Up one level)</span>
                </div>
            `;
        }

        if (files.length === 0) {
            fileListDiv.innerHTML = html + "<p style='color: #888; text-align: center; padding: 10px;'>Folder is empty.</p>";
            return;
        }


        files.forEach(file => {
            const icon = file.isFolder ? "📁" : "📄";
            const sizeText = file.isFolder ? "--" : Math.floor(file.size / 1024) + " KB";
            
            let itemPath = dirPath.endsWith("/") ? dirPath + file.name : dirPath + "/" + file.name;

            let primaryAction = file.isFolder 
                ? `<span class="action-link" style="color: #fce84d;" onclick="loadDirectory('${itemPath}')">Open</span>`
                : `<a class="action-link" style="color: #4daafc;" href="/download?file=${itemPath}">Download</a>`;
                
            let deleteAction = `<span class="action-link" style="color: #ff4d4d;" onclick="deleteFile('${itemPath}', '${file.name}')">Delete</span>`;

            html += `
                <div class="file-row">
                    <div style="flex: 2; display: flex; align-items: center;">
                        <span style="font-size: 24px; margin-right: 15px;">${icon}</span>${file.name}
                    </div>
                    <div style="flex: 1; color: #aaa;">${sizeText}</div>
                    <div style="flex: 1; text-align: right;">${primaryAction}${deleteAction}</div>
                </div>
            `;
        });
        fileListDiv.innerHTML = html;
    }

    
    async function deleteFile(path, name) {
        if (!confirm(`Are you sure you want to delete ${name}?`)) return;
        
        await fetch(`/delete?file=${path}`, { method: 'GET' });
        lastDataJson = ""; // Force re-render
        loadDirectory(currentDirectory, false); // Instantly refresh folder list
    }
    
    // Specialized delete function for the search view
    async function deleteSearchItem(path, name) {
        if (!confirm(`Are you sure you want to delete ${name}?`)) return;
        
        await fetch(`/delete?file=${path}`, { method: 'GET' });
        lastDataJson = ""; // Force re-render
        performSearch(currentSearchQuery); // Instantly refresh search results
    }

    async function performSearch(query) {
        const q = query || document.getElementById('search-input').value;
        if (!q) {
            loadDirectory(currentDirectory);
            return;
        }

        isSearching = true;
        currentSearchQuery = q;
        document.getElementById('current-dir-header').innerText = "Search results for: " + q;

        try {
            const response = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
            if (response.status === 401) {
                window.location.href = "/login.html";
                return;
            }

            const data = await response.json();

            const currentDataJson = JSON.stringify(data);
            if (currentDataJson !== lastDataJson) {
                lastDataJson = currentDataJson;
                renderSearchResults(data.files);
            }
        } catch (err) {
            console.error("Search failed", err);
        }
    }

    function renderSearchResults(files) {
        const fileListDiv = document.getElementById('file-list');
        let html = `
            <div class="file-row">
                <span class="back-btn" onclick="loadDirectory(currentDirectory)">⬅️ Back to folder</span>
            </div>
        `;

        if (files.length === 0) {
            fileListDiv.innerHTML = html + "<p style='color: #888; text-align: center; padding: 10px;'>No files found.</p>";
            return;
        }

        files.forEach(file => {
            const icon = file.isFolder ? "📁" : "📄";
            const sizeText = file.isFolder ? "--" : Math.floor(file.size / 1024) + " KB";
            let itemPath = file.parentDir.endsWith("/") ? file.parentDir + file.name : file.parentDir + "/" + file.name;

            let primaryAction = file.isFolder 
                ? `<span class="action-link" style="color: #fce84d;" onclick="loadDirectory('${itemPath}')">Open</span>`
                : `<a class="action-link" style="color: #4daafc;" href="/download?file=${itemPath}">Download</a>`;
                
            let deleteAction = `<span class="action-link" style="color: #ff4d4d;" onclick="deleteSearchItem('${itemPath}', '${file.name}')">Delete</span>`;

            html += `
                <div class="file-row">
                    <div style="flex: 2; display: flex; align-items: center;">
                        <div style="display: flex; flex-direction: column;">
                            <div style="display: flex; align-items: center;">
                                <span style="font-size: 24px; margin-right: 15px;">${icon}</span>${file.name}
                            </div>
                            <small style="color: #666; margin-left: 39px;">${file.parentDir}</small>
                        </div>
                    </div>
                    <div style="flex: 1; color: #aaa;">${sizeText}</div>
                    <div style="flex: 1; text-align: right;">${primaryAction}${deleteAction}</div>
                </div>
            `;
        });
        fileListDiv.innerHTML = html;
    }

    // Clears the cookie and reloads the page (which kicks them to login)
    function logout() {
        document.cookie = "ESP32_SESSION=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        window.location.href = "/login.html";
    }

    // Allow hitting "Enter" on the keyboard to trigger the search
    document.getElementById('search-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') performSearch();
    });

    window.addEventListener("popstate", (event) => {
        if (event.state && event.state.path) {
            loadDirectory(event.state.path, false);
        } else {
            loadDirectory("/", false);
        }
    });


    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById('upload-input');
        if(fileInput.files.length === 0) return;

        const formData = new FormData();
        formData.append('upload_file', fileInput.files[0]);

        const submitBtn = e.target.querySelector('button');
        submitBtn.disabled = true;
        submitBtn.innerText = "Uploading...";

        try {
            const response = await fetch(`/upload?dir=${currentDirectory}`, {
                method: 'POST',
                body: formData
            });
            
            if (response.status === 401) {
                window.location.href = "/login.html";
                return;
            }
            fileInput.value = "";
            lastDataJson = ""; // Force re-render
            await loadDirectory(currentDirectory, false);
        } catch (err) {
            alert("Upload failed");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Upload";
        }
    });


    const urlParams = new URLSearchParams(window.location.search);
    const startDir = urlParams.get('dir') || "/";
    loadDirectory(startDir);


    setInterval(() => {
        if (isSearching) {
            performSearch(currentSearchQuery);
        } else {
            loadDirectory(currentDirectory, false);
        }
    }, 3000);

</script>
</body>
</html>
