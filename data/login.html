<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESP32 NAS</title>
    <style>
        body { background-color: #202020; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: #2d2d2d; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; width: 300px; }
        input[type="text"], input[type="password"]{ width: 90%; padding: 10px; margin: 10px 0; border-radius: 4px;background: #1a1a1a; color: white; font-size: 16px; border: 1px solid #444;}
        button { background-color: #4daafc; color: #000; padding: 10px 0; border: 1px solid #444; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .error { color: #ff4d4d; display: none; margin-bottom: 10px; font-size: 14px; }
        .success { color: #4dfc67; display: none; margin-bottom: 10px; font-size: 14px; }
        .toggle-link { color: #4daafc; cursor: pointer; text-decoration: underline; font-size: 14px; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2 id="form-title">NAS Login</h2>
    <p id="error-msg" class="error">Incorrect username or password.</p>
    <p id="success-msg" class="success">Account created! Please sign in.</p>

    <!-- Unified Form -->
    <form id="auth-form" action="/login" method="POST">
        <input type="text" name="username" placeholder="Username" required autofocus>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" id="submit-btn">Sign In</button>
    </form>

    <span class="toggle-link" id="toggle-form" onclick="toggleForm()">Create an account</span>
</div>

<script>
    let isLogin = true;

    function toggleForm() {
        isLogin = !isLogin;
        const form = document.getElementById('auth-form');
        const title = document.getElementById('form-title');
        const btn = document.getElementById('submit-btn');
        const toggleLink = document.getElementById('toggle-form');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (isLogin) {
            form.action = '/login';
            title.innerText = 'NAS Login';
            btn.innerText = 'Sign In';
            toggleLink.innerText = 'Create an account';
        } else {
            form.action = '/register';
            title.innerText = 'Create Account';
            btn.innerText = 'Register';
            toggleLink.innerText = 'Already have an account? Sign in';
        }
    }

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
        const errType = urlParams.get('error');
        const errorMsg = document.getElementById('error-msg');
        if (errType === '1') {
            errorMsg.innerText = 'Incorrect username or password.';
        } else if (errType === '2') {
            errorMsg.innerText = 'Username already exists.';
            toggleForm(); // Switch to register mode
        } else if (errType === '3') {
            errorMsg.innerText = 'Registration failed. Try again.';
            toggleForm();
        }
        errorMsg.style.display = 'block';
    } else if (urlParams.has('success')) {
        document.getElementById('success-msg').style.display = 'block';
    }
</script>

</body>
</html>
