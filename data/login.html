<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESP32 NAS</title>
    <style>
        body { background-color: #202020; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: #2d2d2d; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; width: 300px; }
        input[type="password"] { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #444; border-radius: 4px; background: #1a1a1a; color: white; font-size: 16px; }
        button { background-color: #4daafc; color: #000; padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        .error { color: #ff4d4d; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>NAS Login</h2>
    <p id="error-msg" class="error">Incorrect password. Try again.</p>
    <form action="/login" method="POST">
        <input type="password" name="password" placeholder="Enter Password" required autofocus>
        <button type="submit">Sign In</button>
    </form>
</div>

<script>

    if (window.location.search.includes('error=1')) {
        document.getElementById('error-msg').style.display = 'block';
    }
</script>

</body>
</html>
